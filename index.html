<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByttenApple | Streaming Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos Generales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Navegación */
        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff3b30; /* Un rojo "manzana" vibrante */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hero Section (Encabezado) */
        .hero {
            height: 80vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), #0a0a0a), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .btn-prueba {
            background-color: #ff3b30;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: transform 0.3s, background-color 0.3s;
        }

        .btn-prueba:hover {
            background-color: #d32f2f;
            transform: scale(1.05);
        }

        /* Carrusel / Cartelera */
        .content-section {
            padding: 50px;
        }

        .content-section h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .carousel-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: none; /* Ocultar scroll en Firefox */
        }

        .carousel-container::-webkit-scrollbar {
            display: none; /* Ocultar scroll en Chrome/Safari */
        }

        .movie-card {
            min-width: 200px;
            height: 300px;
            background-color: #222;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-card:hover {
            transform: scale(1.1);
            z-index: 5;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
        }

        .movie-card::after {
            content: "VER AHORA";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px 10px;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie-card:hover::after {
            opacity: 1;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">ByttenApple</div>
    </nav>

    <header class="hero">
        <h1>Lo mejor está aquí.</h1>
        <p>Series originales, películas premiadas y documentales que no verás en ningún otro lugar.</p>
        <a href="#" class="btn-prueba">Comienza tu prueba gratuita</a>
    </header>

    <main class="content-section">
        <h2>Tendencias en ByttenApple</h2>
        <div class="carousel-container">
            <div class="movie-card">
                <img src="https://www.aceprensa.com/wp-content/uploads/2015/07/211672-0-683x1024.jpg?q=80&w=400&auto=format&fit=crop" alt="Peli 1">
            </div>
            <div class="movie-card">
                <img src="https://static.wikia.nocookie.net/rocky/images/3/37/Rocky_IV_Special_Edition_Poster.jpg?q=80&w=400&auto=format&fit=crop" alt="Peli 2">
            </div>
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400&auto=format&fit=crop" alt="Peli 3">
            </div>
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1542204112-173663731102?q=80&w=400&auto=format&fit=crop" alt="Peli 4">
            </div>
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1594908900066-3f47337549d8?q=80&w=400&auto=format&fit=crop" alt="Peli 5">
            </div>
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=400&auto=format&fit=crop" alt="Peli 6">
            </div>
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=400&auto=format&fit=crop" alt="Peli 7">
            </div>
        </div>
    </main>

</body>
</html>
